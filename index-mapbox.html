<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannes de courant Hydro-Québec - Analyse cumulative (Mapbox)</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">
    <style>
        body { margin:0; padding:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
        .mapboxgl-popup-content { padding: 15px; max-width: 300px; }
        .info {
            position: absolute;
            top: 10px;
            right: 10px;
            padding:10px 15px;
            background:white;
            border-radius:5px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            max-width:300px;
            z-index: 1;
        }
        .info h4 { margin:0 0 10px; font-size:16px; color:#333; }
        .info p { margin:5px 0; font-size:13px; color:#666; }
        .legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            line-height:20px;
            color:#555;
            background:white;
            padding:10px;
            border-radius:5px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .legend i { width:18px; height:18px; float:left; margin-right:8px; opacity:0.8; }
        .legend h4 { margin:0 0 8px; font-size:14px; }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background:white;
            padding:15px;
            border-radius:5px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            min-width:200px;
            z-index: 1;
        }
        .controls h4 { margin:0 0 10px; font-size:14px; color:#333; }
        .controls label { display:block; margin:8px 0 4px; font-size:12px; color:#666; font-weight:500; }
        .controls select { width:100%; padding:6px; border:1px solid #ddd; border-radius:4px; font-size:13px; }
        .detail-link { color:#1e88e5; cursor:pointer; text-decoration:underline; font-size:12px; }
        .detail-link:hover { color:#1565c0; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:2000; }
        .modal-overlay.active { display:block; }
        .detail-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:2001; max-width:90%; max-height:90%; overflow-y:auto; }
        .detail-modal.active { display:block; }
        .detail-modal h3 { margin:0 0 15px; color:#333; }
        .detail-modal p { margin:10px 0; color:#666; }
        .detail-table { width:100%; border-collapse:collapse; margin:15px 0; font-size:13px; }
        .detail-table th, .detail-table td { padding:10px; text-align:left; border-bottom:1px solid #e0e0e0; }
        .detail-table thead { background:#f5f5f5; }
        .detail-table th { font-weight:600; color:#555; }
        .detail-table tfoot { font-weight:600; background:#fafafa; }
        .close-modal { position:absolute; top:10px; right:15px; font-size:24px; cursor:pointer; color:#999; }
        .close-modal:hover { color:#333; }
        .mapboxgl-ctrl-geocoder { max-width: 300px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info">
        <h4>Pannes de courant cumulatives</h4>
        <p><b>Taille des hexagones:</b> 1 km</p>
        <p><b>Jours analysés:</b> <span id="days-count">Chargement...</span></p>
        <p style="font-size:11px;color:#999;">Mise à jour: <span id="update-date">Chargement...</span></p>
    </div>

    <div class="legend" id="legend">
        <h4>Impact relatif des pannes</h4>
        <div id="legendItems"><div style="font-size:12px;color:#999;">Chargement...</div></div>
        <div id="legendFooter" style="font-size:11px;color:#666;margin-top:10px;padding-top:8px;border-top:1px solid #e5e7eb;line-height:1.4;max-width:280px;"></div>
    </div>

    <div class="controls">
        <h4>Filtres</h4>
        <label>Date:</label>
        <select id="dateSelect" onchange="updateMap()">
            <option value="all">Résumé complet (défaut)</option>
        </select>
        <label>Heure:</label>
        <select id="hourSelect" onchange="updateMap()">
            <option value="all">Toutes</option>
            <option value="0">0:00</option>
            <option value="1">1:00</option>
            <option value="2">2:00</option>
            <option value="3">3:00</option>
            <option value="4">4:00</option>
            <option value="5">5:00</option>
            <option value="6">6:00</option>
            <option value="7">7:00</option>
            <option value="8">8:00</option>
            <option value="9">9:00</option>
            <option value="10">10:00</option>
            <option value="11">11:00</option>
            <option value="12">12:00</option>
            <option value="13">13:00</option>
            <option value="14">14:00</option>
            <option value="15">15:00</option>
            <option value="16">16:00</option>
            <option value="17">17:00</option>
            <option value="18">18:00</option>
            <option value="19">19:00</option>
            <option value="20">20:00</option>
            <option value="21">21:00</option>
            <option value="22">22:00</option>
            <option value="23">23:00</option>
        </select>
    </div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="detailModal" class="detail-modal">
        <span class="close-modal" onclick="closeDetailModal()">×</span>
        <div id="modalContent"></div>
    </div>

    <script>
        // Set your Mapbox access token here
        mapboxgl.accessToken = 'pk.eyJ1IjoiZXZlbHluZWJyaWUiLCJhIjoiY2themE5OGF2MDdxazJybG9oNzUyaXoxNSJ9.njPe2lcTp82DKjDeGkHaQA';

        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/light-v11',
            center: [-71.2, 46.8],
            zoom: 7.5
        });

        var allData = { daily: {}, total: null };
        var currentFeatures = null;
        var quartileBreaks = null; // computed from overall total_occurrences on load

        var QUARTILE_COLORS = ['#fcbba1', '#fc9272', '#ef3b2c', '#a50f15'];

        function percentile(sortedVals, p) {
            var idx = (sortedVals.length - 1) * p;
            var lo = Math.floor(idx);
            var hi = Math.ceil(idx);
            if (lo === hi) return sortedVals[lo];
            return sortedVals[lo] + (sortedVals[hi] - sortedVals[lo]) * (idx - lo);
        }

        function computeQuartiles(features) {
            var values = [];
            for (var i = 0; i < features.length; i++) {
                var v = features[i].properties.total_occurrences;
                if (typeof v === 'number' && !isNaN(v)) values.push(v);
            }
            values.sort(function(a, b) { return a - b; });
            if (values.length === 0) return null;
            return {
                min: values[0],
                q1: Math.round(percentile(values, 0.25)),
                q2: Math.round(percentile(values, 0.50)),
                q3: Math.round(percentile(values, 0.75)),
                max: values[values.length - 1]
            };
        }

        function getColor(d) {
            if (!quartileBreaks) return '#fcbba1';
            if (d <= quartileBreaks.q1) return QUARTILE_COLORS[0];
            if (d <= quartileBreaks.q2) return QUARTILE_COLORS[1];
            if (d <= quartileBreaks.q3) return QUARTILE_COLORS[2];
            return QUARTILE_COLORS[3];
        }

        function updateLegend() {
            var container = document.getElementById('legendItems');
            var footer = document.getElementById('legendFooter');
            if (!container) return;
            if (!quartileBreaks) {
                container.innerHTML = '<div style="font-size:12px;color:#999;">Chargement...</div>';
                if (footer) footer.innerHTML = '';
                return;
            }
            var q = quartileBreaks;
            var labels = ['Faible', 'Modéré', 'Élevé', 'Très élevé'];
            var html = '';
            for (var i = 0; i < 4; i++) {
                html += '<div><i style="background:' + QUARTILE_COLORS[i] + '"></i>' + labels[i] + '</div>';
            }
            container.innerHTML = html;

            if (footer) {
                var sentence = "Un hexagone est classé comme faible lorsqu'il compte entre " +
                    q.min + " et " + q.q1 + " occurrences de pannes (mesurées aux 15 minutes), modéré entre " +
                    (q.q1 + 1) + " et " + q.q2 + ", élevé entre " +
                    (q.q2 + 1) + " et " + q.q3 + " et très élevé entre " +
                    (q.q3 + 1) + " et " + q.max + ".";
                footer.innerHTML = '<div>' + sentence + '</div>' +
                    '<div style="margin-top:6px;">Chaque niveau regroupe 25% des hexagones.</div>';
            }
        }

        async function loadAllDailyData() {
            // Load all regional files
            const regions = ['west', 'central_west', 'central', 'central_east', 'east', 'far_east'];
            const regionalPromises = regions.map(region =>
                fetch(`total/total_exposure_${region}.geojson`).then(r => r.json())
            );

            const regionalData = await Promise.all(regionalPromises);

            // Merge all regions into one GeoJSON
            allData.total = {
                type: 'FeatureCollection',
                features: regionalData.flatMap(data => data.features)
            };

            console.log(`Loaded ${allData.total.features.length} hexagons from ${regions.length} regions`);

            // Compute quartile breaks from overall total_occurrences distribution
            quartileBreaks = computeQuartiles(allData.total.features);
            console.log('Quartile breaks:', quartileBreaks);
            updateLegend();

            const dateSelect = document.getElementById('dateSelect');
            const dates = [...new Set(allData.total.features.flatMap(f => {
                if (!f.properties.all_datetimes) return [];
                return f.properties.all_datetimes.split(',').map(dt => dt.trim().split(' ')[0]);
            }))].sort();

            // Update info panel with actual data
            document.getElementById('days-count').textContent = dates.length;
            const lastDate = dates[dates.length - 1];
            document.getElementById('update-date').textContent = lastDate;

            for (const date of dates) {
                const opt = document.createElement('option');
                opt.value = date;
                opt.textContent = date;
                dateSelect.appendChild(opt);
            }

            for (const date of dates) {
                try {
                    const resp = await fetch(`daily/daily_${date}.geojson`);
                    allData.daily[date] = await resp.json();
                } catch(e) {
                    console.warn('Could not load daily data for', date);
                }
            }
        }

        function filterDataByDateTime(date, hour) {
            if (date === 'all') return allData.total;

            const dailyData = allData.daily[date];
            if (!dailyData) return null;

            if (hour === 'all') return dailyData;

            const filtered = JSON.parse(JSON.stringify(dailyData));
            filtered.features = filtered.features.map(f => {
                if (!f.properties.all_datetimes) return null;
                const dts = f.properties.all_datetimes.split(',').map(s => s.trim());
                const matchingDts = dts.filter(dt => {
                    const dtHour = parseInt(dt.split(' ')[1].split(':')[0]);
                    return dtHour === parseInt(hour);
                });

                if (matchingDts.length === 0) return null;

                f.properties.filtered_hours_count = matchingDts.length;
                return f;
            }).filter(f => f !== null);

            return filtered;
        }

        function updateMap() {
            const date = document.getElementById('dateSelect').value;
            const hour = document.getElementById('hourSelect').value;

            const data = filterDataByDateTime(date, hour);
            if (!data) return;

            currentFeatures = data;

            const isFiltered = date !== 'all';
            const useFixedColor = isFiltered;

            // Add color property to each feature
            data.features.forEach(f => {
                const hoursCount = isFiltered ? (f.properties.filtered_hours_count || 0) : f.properties.total_occurrences;
                f.properties.display_color = useFixedColor ? '#a50f15' : getColor(hoursCount);
                f.properties.display_hours = hoursCount;
            });

            if (map.getSource('hex-data')) {
                map.getSource('hex-data').setData(data);
            } else {
                map.addSource('hex-data', {
                    type: 'geojson',
                    data: data
                });

                map.addLayer({
                    id: 'hex-layer',
                    type: 'fill',
                    source: 'hex-data',
                    paint: {
                        'fill-color': ['get', 'display_color'],
                        'fill-opacity': useFixedColor ? 0.8 : 0.75
                    }
                });

                map.addLayer({
                    id: 'hex-outline',
                    type: 'line',
                    source: 'hex-data',
                    paint: {
                        'line-color': '#fff',
                        'line-width': 0.5
                    }
                });
            }

            // Update layer paint properties
            map.setPaintProperty('hex-layer', 'fill-opacity', useFixedColor ? 0.8 : 0.75);
        }

        function showDetails(hexId) {
            const feature = allData.total.features.find(f => f.properties.hex_id === hexId);
            if (!feature) return;

            const props = feature.properties;
            const datetimes = props.all_datetimes.split(',').map(s => s.trim()).sort();

            const byDate = {};
            datetimes.forEach(dt => {
                const [date, time] = dt.split(' ');
                if (!byDate[date]) byDate[date] = [];
                byDate[date].push(time);
            });

            let html = '<h3>Hexagone #' + hexId + '</h3>';
            html += '<p><strong>Centroïde:</strong> ' + props.centroid_lat.toFixed(6) + ', ' + props.centroid_lon.toFixed(6) + '</p>';
            html += '<table class="detail-table">';
            html += '<thead><tr><th>Date</th><th>Heures affectées</th><th>Nombre d\'heures</th></tr></thead><tbody>';

            let totalDays = 0;
            let totalHours = 0;

            Object.keys(byDate).sort().forEach(date => {
                const times = byDate[date].sort();
                const numHours = times.length;
                const timeList = times.join(', ');
                totalDays++;
                totalHours += numHours;
                html += '<tr><td>' + date + '</td><td>' + timeList + '</td><td>' + numHours + '</td></tr>';
            });

            html += '</tbody><tfoot><tr><td><strong>Total</strong></td><td>' + totalDays + ' jours</td><td>' + totalHours + ' heures</td></tr></tfoot>';
            html += '</table>';

            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').onclick = closeDetailModal;

        // Initialize map
        map.on('load', async () => {
            await loadAllDailyData();
            updateMap();

            // Add geocoder control
            const geocoder = new MapboxGeocoder({
                accessToken: mapboxgl.accessToken,
                mapboxgl: mapboxgl,
                placeholder: 'Rechercher une adresse...',
                countries: 'ca',
                language: 'fr'
            });
            map.addControl(geocoder);

            // Add navigation controls
            map.addControl(new mapboxgl.NavigationControl(), 'bottom-left');

            // Add click handler for hexagons
            map.on('click', 'hex-layer', (e) => {
                if (e.features.length > 0) {
                    const props = e.features[0].properties;
                    const date = document.getElementById('dateSelect').value;
                    const isFiltered = date !== 'all';
                    const hoursCount = isFiltered ? props.display_hours : props.total_occurrences;

                    const popupContent = '<div style="font-size:13px;">' +
                        '<b>Hexagone #' + props.hex_id + '</b><br>' +
                        '<b>Nombre d\'heures impactées:</b> ' + hoursCount + '<br>' +
                        '<b>Nombre de jours impactés:</b> ' + props.days_affected + '<br>' +
                        '<b>Coordonnées du centroïde:</b><br>' +
                        'Lat: ' + props.centroid_lat.toFixed(6) + ', Lon: ' + props.centroid_lon.toFixed(6) + '<br>' +
                        '<a class="detail-link" onclick="showDetails(' + props.hex_id + ')">Voir les détails complets</a>' +
                        '</div>';

                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(popupContent)
                        .addTo(map);
                }
            });

            // Change cursor on hover
            map.on('mouseenter', 'hex-layer', () => {
                map.getCanvas().style.cursor = 'pointer';
            });

            map.on('mouseleave', 'hex-layer', () => {
                map.getCanvas().style.cursor = '';
            });
        });
    </script>
</body>
</html>
