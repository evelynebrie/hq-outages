name: Quick Deploy (Regenerate HTML from Cache)

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  quick-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: System libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("sf","dplyr","fs","purrr","jsonlite","data.table"), repos="https://cloud.r-project.org")'

      - name: Restore cumulative hex data cache
        uses: actions/cache/restore@v3
        with:
          path: cache/cumulative_hex_data.rds
          key: hq-cumulative-cache-v2-${{ github.run_number }}
          restore-keys: |
            hq-cumulative-cache-v2-
            hq-cumulative-cache-

      - name: Restore hex grid cache
        uses: actions/cache@v3
        with:
          path: public/hex_grid_template.rds
          key: hq-hex-grid-15min-v2
          restore-keys: hq-hex-grid-

      - name: Verify cache
        run: |
          if [ -f "cache/cumulative_hex_data.rds" ]; then
            echo "Cache restored successfully"
            ls -lh cache/cumulative_hex_data.rds
          else
            echo "WARNING: No cache found - script will process all files"
          fi

      - name: Run R script (uses cache, regenerates HTML)
        run: |
          echo "Running R script with cache..."
          echo "This will skip processing cached files and regenerate HTML with regional loading"

          mkdir -p data/daily cache public

          # Script will use cache and only generate outputs
          Rscript R/build_cumulative_hex_15min.R

      - name: Generate summary statistics
        run: |
          echo "Generating summary statistics..."
          Rscript R/generate_summaries.R

      - name: Copy Mapbox and landing page
        run: |
          if [ -f "index-mapbox.html" ]; then
            cp index-mapbox.html public/index-mapbox.html
            echo "Copied Mapbox HTML"
          fi

          if [ -f "index-landing.html" ]; then
            cp index-landing.html public/index-landing.html
            echo "Copied landing page"
          fi

      - name: Deploy to PUBLIC repo (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: evelynebrie/hq-outages-public
          publish_branch: gh-pages
          publish_dir: public
          keep_files: false
          commit_message: "Quick deploy with regenerated HTML - ${{ github.run_number }}"

      - name: Summary
        run: |
          echo "========================================="
          echo "Quick Deploy Complete"
          echo "========================================="
          echo ""
          echo "View at: https://evelynebrie.github.io/hq-outages-public/"
          echo ""
          echo "Used cache - regenerated HTML with regional file loading"
          echo "========================================="
