name: Deploy Mapbox Visualization (Separate)

on:
  # Auto-run after the main 15-min processing workflow finishes, so the
  # Mapbox HTML is always redeployed alongside the fresh data. The
  # `concurrency` group below serializes the gh-pages push with the main
  # workflow so they never collide (that was the source of the old
  # 1m30s race failures).
  workflow_run:
    workflows: ["Process 15-Minute HQ Outage Data with Actions Cache (NEW)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize with the main workflow so two workflows never push to
# gh-pages at the same time (that was the source of the 1m30s failures).
concurrency:
  group: hq-outages-processing
  cancel-in-progress: false

jobs:
  deploy-mapbox:
    runs-on: ubuntu-latest
    # For workflow_run triggers, only run if the upstream workflow succeeded.
    # workflow_dispatch always runs (github.event.workflow_run is null).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify Mapbox HTML exists
        run: |
          echo "📋 Checking for Mapbox HTML file..."

          if [ ! -f "index-mapbox.html" ]; then
            echo "❌ index-mapbox.html not found in repository!"
            echo "   Please ensure the file exists before running this workflow."
            exit 1
          fi

          echo "✅ Found index-mapbox.html"
          ls -lh index-mapbox.html

      - name: Prepare deployment directory
        run: |
          echo "📦 Preparing Mapbox deployment..."

          mkdir -p mapbox-deploy
          cp index-mapbox.html mapbox-deploy/

          # Optional: Copy the landing page if you want to use it
          if [ -f "index-landing.html" ]; then
            cp index-landing.html mapbox-deploy/
            echo "✅ Also copied landing page"
          fi

          # Copy logos folder so welcome modal images resolve
          if [ -d "logos" ]; then
            mkdir -p mapbox-deploy/logos
            cp -r logos/* mapbox-deploy/logos/
            echo "✅ Copied logos: $(ls mapbox-deploy/logos/)"
          fi

          echo "✅ Mapbox HTML ready for deployment"

      # Wait a bit to avoid race condition with main workflow deployment
      - name: Wait for main deployment to settle
        run: |
          echo "⏳ Waiting 30 seconds to avoid deployment race condition..."
          sleep 30

      - name: Deploy Mapbox HTML to PUBLIC repo (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: evelynebrie/hq-outages-public
          publish_branch: gh-pages
          publish_dir: mapbox-deploy
          keep_files: true  # IMPORTANT: Don't delete existing Leaflet files
          commit_message: "Deploy Mapbox visualization - ${{ github.run_number }}"
          destination_dir: .  # Deploy to root of gh-pages

      - name: Summary
        run: |
          echo ""
          echo "========================================="
          echo "✅ MAPBOX DEPLOYMENT COMPLETE"
          echo "========================================="
          echo ""
          echo "🌐 Mapbox view at:"
          echo "   https://evelynebrie.github.io/hq-outages-public/index-mapbox.html"
          echo ""
          echo "📝 Notes:"
          echo "  • Deployed independently of Leaflet workflow"
          echo "  • Uses same GeoJSON data from main workflow"
          echo "  • Existing Leaflet files preserved (keep_files: true)"
          echo "  • Remember to add your Mapbox access token!"
          echo "========================================="
