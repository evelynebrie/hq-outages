name: Process 15-Minute HQ Outage Data with Actions Cache (NEW)

on:
  schedule:
    # Run every 30 minutes to process new 15-minute scraped data
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours - maximum for public repos. Needed for first run processing thousands of files.

    steps:
      - uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: System libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev jq curl

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-packages-15min-v1
          restore-keys: ${{ runner.os }}-r-

      - name: Install R packages
        run: |
          Rscript -e 'pkgs <- c("sf","dplyr","fs","purrr","jsonlite","data.table"); inst <- setdiff(pkgs, rownames(installed.packages())); if(length(inst)) { cat("Installing", length(inst), "packages\n"); install.packages(inst, repos="https://cloud.r-project.org", Ncpus=2) } else { cat("All packages cached\n") }'

      # NEW: Use Actions cache instead of cloning gh-pages repo
      - name: Restore cumulative hex data cache (Actions Cache)
        uses: actions/cache/restore@v3
        with:
          path: cache/cumulative_hex_data.rds
          key: hq-cumulative-cache-v2-${{ github.run_number }}
          restore-keys: |
            hq-cumulative-cache-v2-
            hq-cumulative-cache-

      - name: Verify cache restoration and migrate from old location if needed
        run: |
          echo "📦 Checking cache status..."
          mkdir -p cache

          if [ -f "cache/cumulative_hex_data.rds" ]; then
            echo "✅ Cache restored from Actions cache ($(du -h cache/cumulative_hex_data.rds | cut -f1))"
            ls -lh cache/cumulative_hex_data.rds
          else
            echo "ℹ️  No cache in Actions cache - checking old location (gh-pages) for migration..."

            # Try to get cache from old location (one-time migration)
            if curl -f -L -o cache/cumulative_hex_data.rds \
                "https://raw.githubusercontent.com/evelynebrie/hq-outages-public/gh-pages/cache/cumulative_hex_data.rds" 2>/dev/null; then
              echo "✅ Migrated cache from gh-pages ($(du -h cache/cumulative_hex_data.rds | cut -f1))"
              echo "   This cache will now be stored in Actions cache for future runs"
              ls -lh cache/cumulative_hex_data.rds
            else
              echo "⚠️  No existing cache found anywhere (this is normal for very first run)"
              echo "   Will process all files from scratch (may take longer)"
              echo "   Future runs will use the cache and be much faster!"
            fi
          fi

      - name: Restore hex grid cache
        uses: actions/cache@v3
        with:
          path: public/hex_grid_template.rds
          key: hq-hex-grid-15min-v2
          restore-keys: hq-hex-grid-

      # NEW: Cache downloaded Dropbox files to avoid re-downloading 7000+ files every run
      - name: Restore Dropbox files cache
        uses: actions/cache/restore@v3
        with:
          path: data/daily
          key: dropbox-files-v2-${{ github.run_id }}
          restore-keys: |
            dropbox-files-v2-
            dropbox-files-v1-

      - name: Get Fresh Dropbox Access Token
        id: get_token
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          echo "🔑 Getting fresh access token from refresh token..."

          RESPONSE=$(curl -s -X POST https://api.dropbox.com/oauth2/token \
            -u "${DROPBOX_APP_KEY}:${DROPBOX_APP_SECRET}" \
            -d "grant_type=refresh_token&refresh_token=${DROPBOX_REFRESH_TOKEN}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token. Response:"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "✅ Successfully obtained fresh access token"
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Download files from Dropbox App Folder
        timeout-minutes: 180  # Very generous timeout for first run (downloads 7000+ files). Future runs use cache and are fast (~5 min).
        env:
          DROPBOX_TOKEN: ${{ steps.get_token.outputs.access_token }}
        run: |
          set -eo  # Remove pipefail - it causes issues with head/tail commands

          echo "📥 Listing files from Dropbox App Folder..."
          echo "   Path: /hq-outages (App Folder root)"
          echo "   Strategy: Download only 2026 data (from January 1, 2026 onwards)"
          echo ""

          # Calculate date for filtering - only track data from 2026 onwards
          # Fixed cutoff: January 1, 2026
          CUTOFF_DATE="20260101"
          echo "   Files older than: $CUTOFF_DATE (January 1, 2026) will be skipped"
          echo "   Only tracking 2026 data"
          echo ""

          ALL_FILES=""
          HAS_MORE=true
          CURSOR=""
          PAGE=1

          # List all files recursively from app folder
          while [ "$HAS_MORE" = "true" ]; do
            echo "  Fetching page $PAGE..."

            if [ -z "$CURSOR" ]; then
              # App folders use root path "" or the folder name
              RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/2/files/list_folder \
                -H "Authorization: Bearer $DROPBOX_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"path": "", "recursive": true}')
            else
              RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/2/files/list_folder/continue \
                -H "Authorization: Bearer $DROPBOX_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"cursor\": \"$CURSOR\"}")
            fi

            if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
              echo "❌ Error from Dropbox API:"
              echo "$RESPONSE" | jq '.error'

              # Try alternative path
              echo ""
              echo "Trying alternative path: /hq-outages"
              RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/2/files/list_folder \
                -H "Authorization: Bearer $DROPBOX_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"path": "/hq-outages", "recursive": true}')

              if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
                echo "❌ Still failed. Please check Dropbox configuration."
                exit 1
              fi
            fi

            if ! echo "$RESPONSE" | jq -e '.entries' > /dev/null 2>&1; then
              echo "⚠️  Unexpected response - continuing with empty list"
              break
            fi

            PAGE_COUNT=$(echo "$RESPONSE" | jq '.entries | length')
            echo "    Found $PAGE_COUNT entries"

            PAGE_FILES=$(echo "$RESPONSE" | jq -r '.entries[]? | select(.".tag" == "file") | .path_display' || true)

            if [ ! -z "$PAGE_FILES" ]; then
              if [ -z "$ALL_FILES" ]; then
                ALL_FILES="$PAGE_FILES"
              else
                ALL_FILES="$ALL_FILES"$'\n'"$PAGE_FILES"
              fi
            fi

            HAS_MORE=$(echo "$RESPONSE" | jq -r '.has_more')

            if [ "$HAS_MORE" = "true" ]; then
              CURSOR=$(echo "$RESPONSE" | jq -r '.cursor')
              PAGE=$((PAGE + 1))
            fi
          done

          echo "✅ Completed pagination: $PAGE page(s)"

          TOTAL_COUNT=0
          if [ ! -z "$ALL_FILES" ]; then
            TOTAL_COUNT=$(echo "$ALL_FILES" | wc -l)
          fi
          echo "📊 Total files found: $TOTAL_COUNT"

          if [ $TOTAL_COUNT -eq 0 ]; then
            echo "⚠️  No files found - continuing with cached data"
            mkdir -p data/daily
            exit 0
          fi

          # Look for POLYGON files first (preferred - contains outage AREAS)
          echo ""
          echo "🔍 Looking for POLYGON files (polygons_*.geojson) – these contain outage AREAS"
          POLYGON_FILES=$(echo "$ALL_FILES" | grep "polygons_" | grep -E "[0-9]{8}[Tt][0-9]{6}\.geojson$" || true)
          POLYGON_COUNT=$(echo "$POLYGON_FILES" | grep -v '^$' | wc -l)
          echo "📍 Polygon files found: $POLYGON_COUNT"

          # Also check for joined point files (fallback)
          echo ""
          echo "🔍 Also checking for joined point files (fallback)"
          POINT_FILES=$(echo "$ALL_FILES" | grep "outages_joined_full_" | grep -E "[0-9]{8}[Tt][0-9]{6}\.geojson$" || true)
          POINT_COUNT=$(echo "$POINT_FILES" | grep -v '^$' | wc -l)
          echo "📍 Joined point files found: $POINT_COUNT"

          # Use polygon files if available, otherwise use points
          if [ "$POLYGON_COUNT" -gt 0 ]; then
            echo ""
            echo "✅ Using POLYGON files (recommended – contains actual outage areas)"
            GEOJSON_FILES="$POLYGON_FILES"
            FILE_COUNT=$POLYGON_COUNT
          elif [ "$POINT_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️  Using point files (fallback - no polygons available)"
            GEOJSON_FILES="$POINT_FILES"
            FILE_COUNT=$POINT_COUNT
          else
            echo ""
            echo "❌ No suitable files found"
            echo ""
            echo "Sample of files found (first 10):"
            echo "$ALL_FILES" | head -10
            mkdir -p data/daily
            exit 0
          fi

          # Filter for 2026 files only
          echo ""
          echo "🗓️  Filtering for files from 2026 (cutoff: $CUTOFF_DATE)..."
          RECENT_FILES=$(echo "$GEOJSON_FILES" | while read -r file; do
            if [ -z "$file" ]; then continue; fi
            # Extract date from filename (YYYYMMDD)
            FILE_DATE=$(echo "$file" | grep -oE "[0-9]{8}[Tt][0-9]{6}" | cut -c1-8)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -ge "$CUTOFF_DATE" ]; then
              echo "$file"
            fi
          done)

          RECENT_COUNT=$(echo "$RECENT_FILES" | grep -v '^$' | wc -l)
          echo "📊 2026 files to download: $RECENT_COUNT (filtered from $FILE_COUNT total)"

          if [ "$RECENT_COUNT" -eq 0 ]; then
            echo "⚠️  No 2026 files found - using cache only"
            mkdir -p data/daily
            exit 0
          fi

          # Show sample
          echo ""
          echo "Sample files to download (first 5):"
          echo "$RECENT_FILES" | head -5
          echo ""

          mkdir -p data/daily

          CACHED=0
          NEW=0
          SKIPPED=0
          FAILED=0

          # Count existing files before download
          EXISTING_COUNT=$(find data/daily -name "*.geojson" 2>/dev/null | wc -l)
          echo "📂 Files already in cache: $EXISTING_COUNT"
          echo ""

          # Download files with retry logic
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            filename=$(basename "$file")
            local_path="data/daily/$filename"

            # Skip if already downloaded
            if [ -f "$local_path" ] && [ -s "$local_path" ]; then
              CACHED=$((CACHED + 1))
              continue
            fi

            # Download with retry (up to 3 attempts)
            SUCCESS=false
            for attempt in 1 2 3; do
              if curl -s -f -X POST https://content.dropboxapi.com/2/files/download \
                -H "Authorization: Bearer $DROPBOX_TOKEN" \
                -H "Dropbox-API-Arg: {\"path\": \"$file\"}" \
                -o "$local_path" 2>/dev/null && [ -s "$local_path" ]; then
                NEW=$((NEW + 1))
                SUCCESS=true
                # Show progress every 100 files + first 10
                if [ $NEW -le 10 ] || [ $((NEW % 100)) -eq 0 ]; then
                  echo "  ✓ Downloaded: $filename (progress: $NEW files)"
                fi
                break
              else
                if [ $attempt -lt 3 ]; then
                  sleep 2  # Wait before retry
                fi
              fi
            done

            if [ "$SUCCESS" = false ]; then
              FAILED=$((FAILED + 1))
              [ $FAILED -le 5 ] && echo "  ✗ Failed after 3 attempts: $filename"
              rm -f "$local_path"  # Clean up partial download
            fi

            # Rate limiting: pause every 20 downloads
            if [ $((NEW % 20)) -eq 0 ] && [ $NEW -gt 0 ]; then
              sleep 2
            fi
          done <<< "$RECENT_FILES"

          echo ""
          echo "📊 Download Summary:"
          echo "  • Cached (already present): $CACHED"
          echo "  • Newly downloaded: $NEW"
          echo "  • Failed: $FAILED"
          echo "  • Total available: $(($CACHED + $NEW))"

          if [ $(($CACHED + $NEW)) -eq 0 ]; then
            echo ""
            echo "❌ No files available for processing"
            exit 1
          fi

      # Save Dropbox files cache even if download times out (so progress isn't lost)
      - name: Save Dropbox files cache (even on timeout/failure)
        if: always()  # Run even if previous steps failed/timed out
        uses: actions/cache/save@v3
        with:
          path: data/daily
          key: dropbox-files-v2-${{ github.run_id }}

      - name: Run 15-minute scrape analysis (processing only)
        run: |
          echo "🔬 Starting 15-minute scrape analysis with cache support..."

          if [ ! -f "R/build_cumulative_hex_15min.R" ]; then
            echo "❌ Script not found at R/build_cumulative_hex_15min.R"
            exit 1
          fi

          FILE_COUNT=$(find data/daily -name "*.geojson" 2>/dev/null | wc -l)
          echo "📊 Processing $FILE_COUNT total files"

          if [ -f "cache/cumulative_hex_data.rds" ]; then
            echo "✅ Cache file found - will process only new files!"
          else
            echo "ℹ️  No cache - will process all files (first run)"
          fi

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ No data to process!"
            exit 1
          fi

          # Show sample of files being processed
          echo "Sample files:"
          ls -lh data/daily/*.geojson 2>/dev/null | head -5

          # Run the R script - this includes HTML generation
          Rscript R/build_cumulative_hex_15min.R

      # NOTE: We do NOT copy the cache to public/ anymore!
      # It stays in the cache/ directory and will be saved by Actions cache

      # Save cumulative cache even if processing fails/times out
      - name: Save cumulative hex data cache (even on timeout/failure)
        if: always()  # Run even if R script failed/timed out
        uses: actions/cache/save@v3
        with:
          path: cache/cumulative_hex_data.rds
          key: hq-cumulative-cache-v2-${{ github.run_number }}

      - name: Generate summary statistics
        run: |
          echo "📊 Generating summary statistics..."

          if [ -f "R/generate_summaries.R" ]; then
            Rscript R/generate_summaries.R
          else
            echo "⚠️  generate_summaries.R not found, skipping statistics generation"
          fi

      - name: Verify outputs were created
        run: |
          echo "📁 Verifying generated files..."

          # Check for HTML (warn if missing, but don't fail)
          if [ ! -f "public/index.html" ]; then
            echo "⚠️  WARNING: index.html not created (HTML generation may have failed)"
            echo "   Data files are still valid and will be deployed"
          else
            echo "✅ index.html created successfully"
          fi

          # Check for critical data file
          if [ ! -f "public/total/total_exposure.geojson" ]; then
            echo "❌ CRITICAL: total_exposure.geojson not created!"
            exit 1
          fi

          DAILY_COUNT=$(find public/daily -name "daily_*.geojson" 2>/dev/null | wc -l)
          MONTHLY_COUNT=$(find public/monthly -name "monthly_*.geojson" 2>/dev/null | wc -l)
          SNAPSHOT_COUNT=$(find public/cumulative_snapshots -name "cumulative_*.geojson" 2>/dev/null | wc -l)
          CACHE_SIZE=$([ -f cache/cumulative_hex_data.rds ] && du -h cache/cumulative_hex_data.rds | cut -f1 || echo "N/A")

          echo ""
          echo "📊 Generated files:"
          echo "  • HTML visualization: $([ -f public/index.html ] && echo 'Yes ✅' || echo 'No ⚠️ ')"
          echo "  • Total exposure: Yes ✅"
          echo "  • Daily summaries: $DAILY_COUNT"
          echo "  • Monthly summaries: $MONTHLY_COUNT"
          echo "  • Cumulative snapshots: $SNAPSHOT_COUNT"
          echo "  • Cache size: $CACHE_SIZE (stored in Actions cache, NOT deployed)"

          if [ "$DAILY_COUNT" -eq 0 ]; then
            echo "⚠️  Warning: No daily summaries created"
          fi

          echo ""
          echo "📊 Public directory structure:"
          du -sh public/*/ 2>/dev/null || echo "No subdirectories"

          echo ""
          if [ -f "public/index.html" ]; then
            echo "✅ All files verified successfully"
          else
            echo "⚠️  Data files verified - HTML missing but deployment will continue"
            echo "   Cache is saved in Actions cache for next run!"
          fi

      - name: Display summary statistics
        run: |
          echo "📊 Summary Statistics:"
          echo ""

          if [ -f "public/summaries/summary_report.txt" ]; then
            head -30 public/summaries/summary_report.txt
          else
            echo "Summary report not available"
          fi

      - name: Deploy to PUBLIC repo (gh-pages) - HTML and GeoJSON only
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: evelynebrie/hq-outages-public
          publish_branch: gh-pages
          publish_dir: public
          keep_files: false
          commit_message: "Update 15-minute scrape data (Actions Cache) - ${{ github.run_number }}"
          # Note: This deploys HTML + GeoJSON files only
          # The .rds cache files are NOT in public/ anymore

      - name: Summary
        run: |
          echo ""
          echo "========================================="
          echo "✅ DEPLOYMENT COMPLETE (NEW WORKFLOW)"
          echo "========================================="
          echo ""
          echo "🌐 View at: https://evelynebrie.github.io/hq-outages-public/"
          echo ""

          DAILY_COUNT=$(find public/daily -name "daily_*.geojson" 2>/dev/null | wc -l)
          MONTHLY_COUNT=$(find public/monthly -name "monthly_*.geojson" 2>/dev/null | wc -l)
          CACHE_SIZE=$([ -f cache/cumulative_hex_data.rds ] && du -h cache/cumulative_hex_data.rds | cut -f1 || echo "N/A")

          echo "📊 Deployment summary:"
          echo "  • Daily summaries: $DAILY_COUNT"
          echo "  • Monthly summaries: $MONTHLY_COUNT"
          echo "  • Cache size: $CACHE_SIZE"
          echo "  • Cache location: GitHub Actions cache (10 GB limit)"
          echo "  • Processing: 15-minute interval data"
          echo "  • Next run will use GitHub Actions cache (fast!)"
          echo ""
          echo "🎯 Key improvements:"
          echo "  • Cache NOT stored in git (no repo bloat)"
          echo "  • Faster clone/push (no large binary files)"
          echo "  • 10 GB cache limit (plenty for full year)"
          echo "  • Old workflow still available as backup"
          echo "========================================="

      - name: Trigger next run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Triggering next workflow run..."
          gh workflow run publish-15min-ACTIONS-CACHE.yml
          echo "✅ Next run triggered successfully"
